name: dhikr
description: "A Dhikr Counter app built with Flutter and Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: 4.0.0

  # Responsiveness
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: 4.0.0+1
  build_runner: ^2.13.1

  # Linting
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # Asset code generation
  flutter_gen_runner: ^5.13.0+1

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: false
  colors:
    inputs:
      - assets/colors/colors.xml

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/colors/
